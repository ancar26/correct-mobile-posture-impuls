name: PostureGuard
options:
  bundleIdPrefix: com.postureapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.postureapp.PostureGuard
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    INFOPLIST_FILE: Resources/Info.plist

targets:
  PostureGuard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    resources:
      - Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
